<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanofi Cafe Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 100px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #9a3c09;
      color: #eaeaea;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes slideInFromLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      60% {
        opacity: 1;
        transform: scale(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .animate-pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    /* Header */
    header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #4079ae 0%, #da770c 50%, #085071 100%);
      color: #eaeaea;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      animation: slideInFromLeft 0.8s ease-out forwards;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(14, 160, 233, 0.992), transparent);
      transition: left 0.7s;
    }

    header:hover::before {
      left: 100%;
    }

    .logo {
      font-size: 2.8rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      animation: bounceIn 1s ease-out forwards;
      font-weight: bold;
    }

    .logo svg {
      color: #e55934;
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.9;
      font-style: italic;
      animation: fadeIn 0.8s ease-out 0.5s forwards;
    }

    /* Sidebar toggle button */
    .sidebar-toggle {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      background: linear-gradient(135deg, #e55934 0%, #c73e1d 100%);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(52, 188, 229, 0.4);
      transition: all 0.3s ease;
    }

    .sidebar-toggle:hover {
      padding-left: 20px;
      box-shadow: 0 0 20px rgba(229, 89, 52, 0.5);
    }

    .sidebar-toggle.open {
      transform: translateY(-50%) translateX(256px);
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      width: 256px;
      background: rgba(12, 94, 91, 0.95);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      z-index: 150;
      box-shadow: 4px 0 20px rgba(212, 8, 8, 0.3);
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      border-right: 1px solid rgba(229, 89, 52, 0.2);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-content {
      padding: 24px;
      padding-top: 80px;
    }

    .sidebar h3 {
      color: #e55934;
      margin-bottom: 16px;
      font-size: 1.25rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 140;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sidebar-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Quick navigation */
    .quick-nav {
      position: sticky;
      top: 20px;
      background-color: rgba(60, 140, 146, 0.95);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 25px;
      box-shadow: 0 5px 20px rgba(23, 21, 21, 0.3);
      z-index: 100;
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(229, 89, 52, 0.2);
      transition: all 0.3s ease;
    }

    .quick-nav.hidden {
      opacity: 0;
      transform: translateY(-100%);
      pointer-events: none;
    }

    .quick-nav:hover {
      box-shadow: 0 8px 25px rgba(229, 89, 52, 0.2);
      transform: translateY(-3px);
    }

    .quick-nav.hidden:hover {
      transform: translateY(-100%);
    }

    .quick-nav h3 {
      color: #e55934;
      margin-bottom: 10px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-link {
      padding: 8px 12px;
      background-color: rgba(229, 89, 52, 0.15);
      border-radius: 20px;
      text-decoration: none;
      color: #eaeaea;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(229, 89, 52, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(52, 182, 229, 0.3), transparent);
      transition: left 0.5s;
    }

    .nav-link:hover::before {
      left: 100%;
    }

    .nav-link:hover {
      background-color: rgba(229, 89, 52, 0.3);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 5px 15px rgba(229, 89, 52, 0.3);
      color: #fff;
    }

    /* Menu section */
    .menu-section {
      margin-bottom: 40px;
      background-color: rgba(11, 195, 228, 0.6);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(30px);
      border: 1px solid rgba(52, 123, 229, 0.15);
    }

    .menu-section.animated {
      animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .section-header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      color: #eaeaea;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 2px solid rgba(229, 89, 52, 0.3);
    }

    .section-header:hover {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      padding-left: 25px;
    }

    .section-header svg {
      color: #e55934;
    }

    .section-header h2 {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .menu-items {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* Menu item */
    .menu-item {
      border: 2px solid rgba(6, 161, 188, 0.25);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: linear-gradient(145deg, rgba(165, 16, 3, 0.9) 0%, rgba(42, 121, 218, 0.927) 100%);
      opacity: 0;
      transform: translateY(20px);
      box-shadow: 
        0 4px 15px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(229, 89, 52, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .menu-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgb(9, 148, 161) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 1;
    }

    .menu-item:hover::before {
      opacity: 1;
    }

    .menu-item.animated {
      animation: slideUp 0.5s ease-out forwards;
    }

    .menu-item:nth-child(1).animated { animation-delay: 0.1s; }
    .menu-item:nth-child(2).animated { animation-delay: 0.2s; }
    .menu-item:nth-child(3).animated { animation-delay: 0.3s; }
    .menu-item:nth-child(4).animated { animation-delay: 0.4s; }
    .menu-item:nth-child(5).animated { animation-delay: 0.5s; }
    .menu-item:nth-child(6).animated { animation-delay: 0.6s; }

    .menu-item:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(229, 89, 52, 0.3),
        0 0 0 2px rgba(229, 89, 52, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: #e55934;
    }

    .item-image {
      height: 200px;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .item-image::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, transparent 0%, transparent 50%, rgba(15, 52, 96, 0.9) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .item-image::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(229, 89, 52, 0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 3;
    }

    .menu-item:hover .item-image::after {
      opacity: 1;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: brightness(0.9) saturate(1.1);
    }

    .menu-item:hover .item-image img {
      transform: scale(1.15) rotate(2deg);
      filter: brightness(1.1) saturate(1.2);
    }

    .item-content {
      padding: 20px;
      background: linear-gradient(180deg, rgba(15, 52, 96, 0.5) 0%, rgba(22, 46, 62, 0.8) 100%);
      transition: all 0.4s ease;
      position: relative;
      margin-top: -30px;
      z-index: 5;
    }

    .menu-item:hover .item-content {
      background: linear-gradient(180deg, rgba(15, 52, 96, 0.7) 0%, rgba(22, 33, 62, 0.95) 100%);
    }

    .item-content h4 {
      color: #fff;
      margin-bottom: 10px;
      font-size: 1.3rem;
      font-weight: 700;
      transition: all 0.3s ease;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .menu-item:hover .item-content h4 {
      color: #e55934;
      transform: translateX(5px);
      text-shadow: 0 2px 8px rgba(229, 89, 52, 0.3);
    }

    .item-content p {
      color: rgba(234, 234, 234, 0.85);
      font-size: 0.95rem;
      margin-bottom: 12px;
      min-height: 40px;
      transition: all 0.3s ease;
      line-height: 1.5;
    }

    .menu-item:hover .item-content p {
      color: #eaeaea;
    }

    .price {
      font-weight: 800;
      color: #fff;
      font-size: 1.4rem;
      margin-top: 12px;
      text-align: right;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(229, 89, 52, 0.3) 0%, rgba(199, 62, 29, 0.4) 100%);
      border: 1px solid rgba(229, 89, 52, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .menu-item:hover .price {
      color: #fff;
      transform: scale(1.1) translateY(-2px);
      background: linear-gradient(135deg, #e55934 0%, #c73e1d 100%);
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(229, 89, 52, 0.5);
    }

    .item-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(52, 126, 229, 0.15) 0%, rgba(48, 142, 201, 0.2) 100%);
      color: rgba(234, 234, 234, 0.9);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 8px;
      margin-right: 8px;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(229, 89, 52, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .menu-item:hover .item-tag {
      background: linear-gradient(135deg, rgba(100, 193, 207, 0.949) 0%, rgba(29, 176, 199, 0.4) 100%);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 4px 10px rgba(229, 89, 52, 0.2);
      border-color: rgba(229, 89, 52, 0.4);
    }

    /* Sub-section */
    .sub-section {
      grid-column: 1 / -1;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(240, 230, 214, 0.3);
      opacity: 0;
      transform: translateY(20px);
    }

    .sub-section.animated {
      animation: slideUp 0.6s ease-out forwards;
    }

    .sub-section h3 {
      color: #eaeaea;
      margin-bottom: 20px;
      font-size: 1.5rem;
      padding-left: 10px;
      border-left: 4px solid #e55934;
      transition: all 0.3s ease;
    }

    .sub-section:hover h3 {
      padding-left: 15px;
      color: #e55934;
    }

    .sub-section-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 25px;
      margin-top: 40px;
      color: #e7e6e5;
      font-size: 0.9rem;
      border-top: 1px solid rgba(224, 208, 184, 0.3);
      animation: fadeIn 1s ease-out forwards;
    }

    .highlight {
      color: #e55934;
      font-weight: bold;
    }

    /* Scroll to top button */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #e55934 0%, #c73e1d 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(229, 89, 52, 0.4);
      z-index: 1000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      border: none;
      pointer-events: none;
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .scroll-top:hover {
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    /* Responsive styles */
    @media (max-width: 768px) {
      .menu-items, .sub-section-items {
        grid-template-columns: 1fr;
      }

      .logo {
        font-size: 2.2rem;
      }

      .nav-links {
        gap: 5px;
      }

      .nav-link {
        padding: 6px 10px;
        font-size: 0.8rem;
      }

      .scroll-top {
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .menu-items, .sub-section-items {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

    <!-- Menu sections will be inserted here -->

        <path d="m18 15-6-6-6 6"></path>
      </svg>

  </div>

    function getImageUrl(category, itemName) {
      if (category === "cakes" && itemName.includes("Cookies")) {
        return "https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&w=600&q=80";
      }
      if (itemName.includes("Smoothie")) {
        return "https://images.unsplash.com/photo-1505252585461-04db1eb84625?auto=format&fit=crop&w=600&q=80";
      }
      if (itemName.includes("Ice")) {
        return "https://images.unsplash.com/photo-1568649929103-28ffbefaca1e?auto=format&fit=crop&w=600&q=80";
      }
      if (imageMap[category] && imageMap[category][itemName]) {
        return imageMap[category][itemName];
      }
      return fallbackImages[category] || "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=600&q=80";
    }

    // Generate navigation links
    function generateNavLinks() {
      const navLinks = document.getElementById('navLinks');
      const sidebarNav = document.getElementById('sidebarNav');
      
      Object.keys(menuData).forEach(key => {
        const section = menuData[key];
        
       
        // Sidebar nav link
        const sidebarLink = document.createElement('button');
        sidebarLink.className = 'nav-link';
        sidebarLink.innerHTML = `${icons[section.icon]} ${section.title}`;
        sidebarLink.onclick = () => {
          scrollToSection(key);
          closeSidebar();
        };
        sidebarNav.appendChild(sidebarLink);
      });
    }

    // Generate menu sections
    function generateMenuSections() {
      const container = document.getElementById('menuContainer');
      
      Object.keys(menuData).forEach(key => {
        const section = menuData[key];
        const sectionEl = document.createElement('div');
        sectionEl.className = 'menu-section';
        sectionEl.id = key;
        
        let itemsHTML = '';
        
        if (key === 'pizza') {
          section.items.forEach(item => {
            itemsHTML += `
              <div class="menu-item">
                <div class="item-image">
                  <img src="${getImageUrl('pizza', item.type)}" alt="${item.type}" loading="lazy" crossorigin="anonymous">
                </div>
                <div class="item-content">
                  <h4>${item.type}</h4>
                  <p>Large: ${item.large} ETB | Medium: ${item.medium} ETB | Small: ${item.small}${item.small !== '-' ? ' ETB' : ''}</p>
                </div>
              </div>
            `;
          });
        } else if (section.subsections) {
          section.subsections.forEach(subsection => {
            itemsHTML += `
              <div class="sub-section">
                <h3>${subsection.title}</h3>
                <div class="sub-section-items">
                  ${subsection.items.map(item => `
                    <div class="menu-item">
                      <div class="item-image">
                        <img src="${getImageUrl(key, item.name)}" alt="${item.name}" loading="lazy" crossorigin="anonymous">
                      </div>
                      <div class="item-content">
                        <h4>${item.name}</h4>
                        <span class="price">${typeof item.price === 'number' ? `${item.price} ETB` : item.price}</span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          });
        } else {
          section.items.forEach(item => {
            itemsHTML += `
              <div class="menu-item">
                <div class="item-image">
                  <img src="${getImageUrl(key, item.name)}" alt="${item.name}" loading="lazy" crossorigin="anonymous">
                </div>
                <div class="item-content">
                  <h4>${item.name}</h4>
                  <p>${item.description || ''}</p>
                  ${item.tag ? `<span class="item-tag">${item.tag}</span>` : ''}
                  <span class="price">${item.price} ETB</span>
                </div>
              </div>
            `;
          });
        }
        
        sectionEl.innerHTML = `
          <div class="section-header">
            ${icons[section.icon]}
            <h2>${section.title}</h2>
          </div>
          <div class="menu-items">
            ${itemsHTML}
          </div>
        `;
        
        container.appendChild(sectionEl);
      });
    }

    // Scroll functions
    function scrollToSection(sectionId) {
      const element = document.getElementById(sectionId);
      if (element) {
        window.scrollTo({
          top: element.offsetTop - 100,
          behavior: 'smooth'
        });
      }
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    // Sidebar functions
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarToggle').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('visible');
      document.getElementById('menuIcon').style.display = 'none';
      document.getElementById('closeIcon').style.display = 'block';
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarToggle').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('visible');
      document.getElementById('menuIcon').style.display = 'block';
      document.getElementById('closeIcon').style.display = 'none';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      generateNavLinks();
      generateMenuSections();

      // Sidebar toggle
      document.getElementById('sidebarToggle').addEventListener('click', function() {
        if (document.getElementById('sidebar').classList.contains('open')) {
          closeSidebar();
        } else {
          openSidebar();
        }
      });

      // Overlay click to close
      document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

      // Scroll to top button
      document.getElementById('scrollTop').addEventListener('click', scrollToTop);

      // Scroll detection
      let lastScrollY = 0;
      const quickNav = document.getElementById('quickNav');
      const scrollTopBtn = document.getElementById('scrollTop');

      window.addEventListener('scroll', function() {
        const currentScrollY = window.scrollY;
        
        // Show/hide scroll to top button
        if (currentScrollY > 300) {
          scrollTopBtn.classList.add('visible');
        } else {
          scrollTopBtn.classList.remove('visible');
        }
        
        // Hide/show quick nav based on scroll direction
        if (currentScrollY > lastScrollY && currentScrollY > 100) {
          quickNav.classList.add('hidden');
        } else {
          quickNav.classList.remove('hidden');
        }
        
        lastScrollY = currentScrollY;
      }, { passive: true });

      // Intersection Observer for animations
      const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.1
      };

      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('animated');
            
            setTimeout(function() {
              const menuItems = entry.target.querySelectorAll('.menu-item');
              menuItems.forEach(function(item, index) {
                setTimeout(function() {
                  item.classList.add('animated');
                }, index * 50);
              });
              
              const subSections = entry.target.querySelectorAll('.sub-section');
              subSections.forEach(function(subSection, index) {
                setTimeout(function() {
                  subSection.classList.add('animated');
                }, index * 200);
              });
            }, 100);
          }
        });
      }, observerOptions);

      document.querySelectorAll('.menu-section').forEach(function(section) {
        observer.observe(section);
      });
    });
  </script>
</body>
</html>
